<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FITNESS 로그인</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(120deg, rgba(0,22,25,.86), rgba(0,35,40,.74)),
        url("assets/hero-fitness-blur.jpg") center / cover fixed;
    }
    .login-card {
      width: min(430px, calc(100% - 36px));
      padding: 36px;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.13);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 55px rgba(0,0,0,.28);
    }
    .login-card h1 { margin: 18px 0 8px; font-size: 42px; }
    .login-card p { color: rgba(255,255,255,.78); line-height: 1.5; }
    input {
      width: 100%;
      height: 54px;
      margin-top: 12px;
      padding: 0 16px;
      border: 1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.92);
      color: #111;
      font-size: 16px;
    }
    .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
    button {
      height: 54px;
      border: 0;
      font-weight: 900;
      cursor: pointer;
      background: #fff;
      color: #111;
    }
    button.ghost {
      background: rgba(255,255,255,.16);
      color: #fff;
      border: 1px solid rgba(255,255,255,.28);
    }
    #msg { min-height: 24px; font-weight: 800; }
  </style>
</head>
<body>
  <section class="login-card">
    <a href="index.html">← 홈으로</a>
    <h1>FITNESS</h1>
    <p>로그인하면 운동 결과 저장과 랭킹 등록을 사용할 수 있습니다.</p>

    <input id="id" placeholder="아이디">
    <input id="pw" type="password" placeholder="비밀번호">

    <div class="buttons">
      <button onclick="auth('login')">로그인</button>
      <button class="ghost" onclick="auth('register')">회원가입</button>
    </div>

    <p id="msg"></p>
  </section>


<script>
const FITNESS_KEYS = ["fitnessUserId", "fitnessUser", "user", "loggedInUserId", "currentUser", "username"];

function saveLogin(id) {
  for (const key of FITNESS_KEYS) localStorage.setItem(key, id);
}

async function auth(mode) {
  const id = document.getElementById("id").value.trim();
  const pw = document.getElementById("pw").value;
  const msg = document.getElementById("msg");

  if (!id || !pw) {
    msg.textContent = "아이디와 비밀번호를 입력해주세요.";
    return;
  }

  try {
    const encoded = btoa(unescape(encodeURIComponent(id + ":" + pw + ":" + mode)));
    const res = await fetch("/api/login", { method: "POST", body: encoded });
    const data = await res.json();

    if (data.status === "success") {
      if (mode === "login") {
        saveLogin(id);
        msg.textContent = "로그인 성공";
        setTimeout(() => location.href = "index.html", 400);
      } else {
        msg.textContent = data.message || "회원가입 완료. 이제 로그인해주세요.";
      }
    } else {
      msg.textContent = data.message || "실패했습니다.";
    }
  } catch (e) {
    msg.textContent = "서버 연결 실패. Java 서버를 확인해주세요.";
  }
}
</script>

</body>
</html>
